<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Il Gran Juego — Coming Soon</title>
  <meta name="description" content="Il gioco di pronostici tra amici. Presto online." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F7F4EE;
      --ink:   #1A1A2E;
      --red:   #E63946;
      --mid:   #888888;
      --border: #D8D4CC;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .wrap {
      max-width: 560px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* EYEBROW */
    .eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 20px;
    }

    /* LOGO / TITLE */
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(52px, 12vw, 88px);
      line-height: 0.92;
      text-transform: uppercase;
      text-align: center;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 32px;
    }

    .logo span {
      color: var(--red);
    }

    /* DIVIDER */
    .divider {
      width: 40px;
      height: 3px;
      background: var(--red);
      margin-bottom: 32px;
    }

    /* IMAGE */
    .hero-img {
      width: min(320px, 80vw);
      height: min(320px, 80vw);
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--ink);
      margin-bottom: 36px;
      display: block;
    }

    /* TAGLINE */
    .tagline {
      font-family: 'Barlow', sans-serif;
      font-size: clamp(15px, 3.5vw, 18px);
      font-weight: 500;
      color: var(--ink);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .sub {
      font-size: 13px;
      color: var(--mid);
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* FOOTER */
    footer {
      margin-top: 60px;
      font-size: 11px;
      color: var(--border);
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 400px) {
      body { padding: 32px 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">Coming Soon</p>

    <h1 class="logo">Il Gran<br /><span>Juego</span></h1>

    <div class="divider"></div>

    <img class="hero-img" src="hero.jpeg" alt="Il Gran Juego" />

    <p class="tagline">Il gioco di pronostici tra amici.<br />Presto online.</p>
    <p class="sub">ilgranjuego.it</p>
  </div>

  <footer>&copy; 2026 Il Gran Juego</footer>
</body>
</html>
