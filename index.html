<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Il Gran Juego — Coming Soon</title>
  <meta name="description" content="Il gioco di pronostici tra amici. Presto online." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:  #FF1E8E;
      --blue:  #1D3FD6;
      --ink:   #1A1A2E;
      --mid:   #888888;
      --border: #D8D4CC;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #FFFFFF;
      color: var(--ink);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 64px 24px 40px;
    }

    .wrap {
      max-width: 560px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* EYEBROW */
    .eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #FFFFFF;
      background: var(--blue);
      padding: 8px 20px;
      border-radius: 24px;
      margin-bottom: 24px;
    }

    /* LOGO / TITLE */
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(52px, 12vw, 88px);
      line-height: 0.92;
      text-transform: uppercase;
      text-align: center;
      color: var(--blue);
      letter-spacing: -0.01em;
      margin-bottom: 32px;
      -webkit-text-stroke: 3px var(--pink);
      paint-order: stroke fill;
      text-shadow:
        4px 4px 0 var(--pink),
        6px 6px 0 var(--pink);
    }

    .logo span {
      color: var(--blue);
    }

    /* DIVIDER */
    .divider {
      width: 40px;
      height: 5px;
      background: var(--blue);
      border-radius: 3px;
      margin-bottom: 32px;
    }

    /* IMAGE */
    .hero-frame {
      width: min(320px, 80vw);
      height: min(320px, 80vw);
      border-radius: 50%;
      overflow: hidden;
      border: 6px solid var(--blue);
      box-shadow: 0 0 0 4px var(--pink);
      margin-bottom: 36px;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.5) contrast(1.15);
      display: block;
    }

    /* TAGLINE */
    .tagline {
      font-family: 'Barlow', sans-serif;
      font-size: clamp(15px, 3.5vw, 18px);
      font-weight: 500;
      color: var(--ink);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .highlight {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(18px, 4vw, 22px);
      color: #FFFFFF;
      background: var(--pink);
      padding: 8px 18px;
      border-radius: 12px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .sub {
      font-size: 13px;
      color: var(--mid);
      text-align: center;
      letter-spacing: 0.04em;
      margin-top: 20px;
    }

    /* FOOTER */
    footer {
      margin-top: 60px;
      font-size: 11px;
      color: var(--border);
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 400px) {
      body { padding: 32px 16px; }
    }
  </style>
</head>
